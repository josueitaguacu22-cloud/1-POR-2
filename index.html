<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Dupla Integrada</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            padding: 20px;
            text-align: center;
        }

        .main-wrapper {
            display: block;
            max-width: 840px;
            margin: 40px auto;
            text-align: left;
        }

        .container-table {
            display: table;
            width: 100%;
            border-collapse: separate;
            border-spacing: 20px 0;
        }

        .container-column {
            display: table-cell;
            width: 50%;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            vertical-align: top;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 22px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e4e8;
            border-radius: 10px;
            font-size: 18px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #ffffff;
        }

        input:focus {
            border-color: #007bff;
        }

        input:disabled {
            background-color: #f8f9fa;
            color: #6c757d;
            border-color: #e1e4e8;
            cursor: not-allowed;
        }

        .btn-main {
            width: calc(100% - 40px);
            margin: 10px 20px;
            padding: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 8px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-main:hover {
            background-color: #218838;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .box-blue {
            background-color: #e7f3ff;
            border-left: 5px solid #007bff;
        }

        .box-orange {
            background-color: #fff4e6;
            border-left: 5px solid #fd7e14;
        }

        .result-box span {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }

        .result-box strong {
            font-size: 28px;
        }

        .color-blue { color: #007bff; }
        .color-orange { color: #fd7e14; }

        @media (max-width: 768px) {
            .container-table {
                display: block;
            }
            .container-column {
                display: block;
                width: 100%;
                margin-bottom: 20px;
            }
            .main-wrapper {
                margin: 10px auto;
            }
            .btn-main {
                width: 100%;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="container-table">
            
            <div class="container-column">
                <h2>1. Multiplicador Base</h2>

                <div class="input-group">
                    <label for="valorBase">Valor Base:</label>
                    <input type="number" id="valorBase" step="any" placeholder="Ex: 10" oninput="sincronizarValorBase()">
                </div>

                <div class="input-group">
                    <label for="multiplicador">Multiplicar por (Ex: 1,66):</label>
                    <input type="number" id="multiplicador" step="any" placeholder="Ex: 1.66">
                </div>

                <div class="result-box box-blue">
                    <span>Resultado Final (Multiplicado):</span>
                    <strong id="resultadoMultiplicado" class="color-blue">0,00</strong>
                </div>
            </div>

            <div class="container-column">
                <h2>2. Diferença e Multiplicação</h2>

                <div class="input-group">
                    <label for="valorBaseEspelho">Valor Base (Puxado automaticamente):</label>
                    <input type="number" id="valorBaseEspelho" step="any" placeholder="Preencha na caixa 1" disabled>
                </div>

                <div class="input-group">
                    <label for="valorMultiplicarExtra">Multiplicar a diferença por? (Opcional):</label>
                    <input type="number" id="valorMultiplicarExtra" step="any" placeholder="Ex: 5.33">
                </div>

                <div class="result-box box-orange">
                    <span id="textoResultadoCaixa2">Diferença Restante:</span>
                    <strong id="resultadoCaixa2" class="color-orange">0,00</strong>
                </div>
            </div>

        </div>

        <button class="btn-main" onclick="calcularTudo()">CALCULAR TUDO</button>

    </div>

    <script>
        // Puxa o valor da primeira caixa só para demonstração visual
        function sincronizarValorBase() {
            const valor = document.getElementById('valorBase').value;
            document.getElementById('valorBaseEspelho').value = valor;
        }

        // Deixa o número bonito com vírgula no final
        function formatarNumero(num) {
            if (num % 1 === 0) {
                return num.toString();
            } else {
                return num.toFixed(2).replace('.', ',');
            }
        }

        function calcularTudo() {
            const valorBase = parseFloat(document.getElementById('valorBase').value);
            const multiplicador = parseFloat(document.getElementById('multiplicador').value);
            
            const campoMult = document.getElementById('resultadoMultiplicado');
            const campoCaixa2 = document.getElementById('resultadoCaixa2');
            const textoCaixa2 = document.getElementById('textoResultadoCaixa2');

            // 1. Calcula a Multiplicação Base
            let resultadoMultiplicacao = 0;

            if (isNaN(valorBase) || isNaN(multiplicador)) {
                campoMult.innerText = "Erro";
                campoMult.style.color = "#dc3545";
                campoCaixa2.innerText = "0,00";
                return; 
            } else {
                resultadoMultiplicacao = valorBase * multiplicador;
                campoMult.style.color = "#007bff";
                campoMult.innerText = formatarNumero(resultadoMultiplicacao);
            }

            // 2. Acha a diferença exata: (Resultado Final) - (Valor Base)
            let diferencaRestante = resultadoMultiplicacao - valorBase;

            // 3. Verifica se tem algum valor para MULTIPLICAR a diferença
            let valorMultiplicarExtra = parseFloat(document.getElementById('valorMultiplicarExtra').value);
            
            campoCaixa2.style.color = "#fd7e14";

            if (!isNaN(valorMultiplicarExtra)) {
                // Se digitou algo na caixa opcional, multiplica a diferença por esse número
                let resultadoFinalMultiplicado = diferencaRestante * valorMultiplicarExtra;
                textoCaixa2.innerText = "Diferença Multiplicada:";
                campoCaixa2.innerText = formatarNumero(resultadoFinalMultiplicado);
            } else {
                // Se deixou vazio, mostra só a diferença normal (os 6,60)
                textoCaixa2.innerText = "Diferença Restante:";
                campoCaixa2.innerText = formatarNumero(diferencaRestante);
            }
        }
    </script>
</body>
</html>
