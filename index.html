<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 por 2</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #e4e6eb;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
        }

        .main-wrapper {
            display: block;
            max-width: 800px;
            margin: 20px auto;
            text-align: left;
        }

        .app-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .app-header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d2ff 0%, #28a745 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .app-header p {
            color: #7c8296;
            font-size: 14px;
            margin-top: 5px;
        }

        .container-table {
            display: table;
            width: 100%;
            border-collapse: separate;
            border-spacing: 16px 0;
        }

        .container-column {
            display: table-cell;
            width: 50%;
            background-color: #161820;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid #252836;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            vertical-align: top;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 22px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #252836;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #9ea3b5;
            font-weight: 500;
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #2d3142;
            border-radius: 12px;
            font-size: 17px;
            outline: none;
            background-color: #1f222e;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.15);
        }

        input:disabled {
            background-color: #12131a;
            color: #62677a;
            border-color: #1f222e;
            cursor: not-allowed;
        }

        /* CAIXA DE ALERTA (VAI GANHAR / VAI PERDER) */
        .alert-box {
            display: none; /* Escondido por padrão até calcular */
            margin: 10px 16px 15px 16px;
            padding: 16px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            letter-spacing: 1px;
            animation: fadeIn 0.4s ease;
        }

        .alert-loss {
            background-color: rgba(255, 77, 77, 0.12);
            border: 1px solid rgba(255, 77, 77, 0.4);
            color: #ff4d4d;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.15);
        }

        .alert-win {
            background-color: rgba(35, 197, 82, 0.12);
            border: 1px solid rgba(35, 197, 82, 0.4);
            color: #23c552;
            box-shadow: 0 0 15px rgba(35, 197, 82, 0.15);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* BOTÃO PRINCIPAL */
        .btn-main {
            width: calc(100% - 32px);
            margin: 5px 16px 10px 16px;
            padding: 16px;
            background: linear-gradient(135deg, #23c552 0%, #1b9c3e 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(35, 197, 82, 0.25);
            letter-spacing: 0.5px;
        }

        .btn-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(35, 197, 82, 0.35);
        }

        .btn-main:active {
            transform: translateY(1px);
        }

        .result-box {
            margin-top: 20px;
            padding: 18px;
            border-radius: 14px;
            text-align: center;
            min-height: 90px;
            display: block;
        }

        .box-blue {
            background-color: rgba(0, 210, 255, 0.06);
            border: 1px solid rgba(0, 210, 255, 0.15);
            border-left: 4px solid #00d2ff;
        }

        .box-orange {
            background-color: rgba(255, 159, 28, 0.06);
            border: 1px solid rgba(255, 159, 28, 0.15);
            border-left: 4px solid #ff9f1c;
        }

        .result-box span {
            display: block;
            font-size: 13px;
            color: #9ea3b5;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .result-box strong {
            font-size: 26px;
            font-weight: 700;
        }

        /* NOVA CAIXINHA DE DIFERENÇA BASE */
        .mini-box {
            margin-top: 12px;
            padding: 12px 16px;
            background-color: #1f222e;
            border-radius: 10px;
            border: 1px dashed #3a3f52;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mini-box span {
            font-size: 13px;
            color: #9ea3b5;
            font-weight: 500;
        }

        .mini-box strong {
            font-size: 16px;
            font-weight: 700;
        }

        .color-blue { color: #00d2ff; }
        .color-orange { color: #ff9f1c; }

        @media (max-width: 768px) {
            .container-table {
                display: block;
            }
            .container-column {
                display: block;
                width: 100%;
                margin-bottom: 16px;
                padding: 20px;
            }
            .btn-main {
                width: 100%;
                margin: 15px 0 0 0;
            }
            .main-wrapper {
                margin: 5px auto;
            }
            .alert-box {
                margin: 0 0 15px 0;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="app-header">
            <h1>1 por 2</h1>
            <p>Multiplicação Integrada & Análise de Diferença</p>
        </div>

        <div class="container-table">
            
            <div class="container-column">
                <h2>1. Multiplicador Base</h2>

                <div class="input-group">
                    <label for="valorBase">QUANTO APOSTAR NO FORTE:</label>
                    <input type="number" id="valorBase" step="any" placeholder="Ex: 10" oninput="sincronizarValorBase()">
                </div>

                <div class="input-group">
                    <label for="multiplicador">ODD DO FORTE:</label>
                    <input type="number" id="multiplicador" step="any" placeholder="Ex: 1.33">
                </div>

                <div class="result-box box-blue">
                    <span>LUCRO DO FORTE:</span>
                    <strong id="resultadoMultiplicado" class="color-blue">0,00</strong>
                </div>
            </div>

            <div class="container-column">
                <h2>2. Diferença e Multiplicação</h2>

                <div class="input-group">
                    <label for="valorBaseEspelho">Valor Base (Automático):</label>
                    <input type="number" id="valorBaseEspelho" step="any" placeholder="Aguardando Caixa 1" disabled>
                </div>

                <div class="input-group">
                    <label for="valorMultiplicarExtra">ODD DO FRACO:</label>
                    <input type="number" id="valorMultiplicarExtra" step="any" placeholder="Ex: 5.66">
                </div>

                <div class="result-box box-orange">
                    <span id="textoResultadoCaixa2">LUCRO DO FRACO:</span>
                    <strong id="resultadoCaixa2" class="color-orange">0,00</strong>
                </div>

                <div class="mini-box">
                    <span>QUANTO APOSTAR NO FRACO</span>
                    <strong id="valorDiferencaBase" class="color-orange">0,00</strong>
                </div>
            </div>

        </div>

        <div id="alertaGeral" class="alert-box"></div>

        <button class="btn-main" onclick="calcularTudo()">CALCULAR TUDO</button>

    </div>

    <script>
        function sincronizarValorBase() {
            const valor = document.getElementById('valorBase').value;
            document.getElementById('valorBaseEspelho').value = valor;
        }

        function formatarNumero(num) {
            if (num % 1 === 0) {
                return num.toString();
            } else {
                return num.toFixed(2).replace('.', ',');
            }
        }

        function calcularTudo() {
            const valorBase = parseFloat(document.getElementById('valorBase').value);
            const multiplicador = parseFloat(document.getElementById('multiplicador').value);
            
            const campoMult = document.getElementById('resultadoMultiplicado');
            const campoCaixa2 = document.getElementById('resultadoCaixa2');
            const textoCaixa2 = document.getElementById('textoResultadoCaixa2');
            const campoDiferencaBase = document.getElementById('valorDiferencaBase');
            const alerta = document.getElementById('alertaGeral');

            if (isNaN(valorBase) || isNaN(multiplicador)) {
                campoMult.innerText = "Erro";
                campoMult.style.color = "#ff4d4d";
                campoCaixa2.innerText = "0,00";
                campoDiferencaBase.innerText = "0,00";
                alerta.style.display = "none";
                return; 
            }

            // 1. Calcula Caixa 1 (Valor Azul)
            let resultadoMultiplicacao = valorBase * multiplicador;
            campoMult.style.color = "#00d2ff";
            campoMult.innerText = formatarNumero(resultadoMultiplicacao);

            // 2. Calcula Diferença Automática
            let diferencaRestante = resultadoMultiplicacao - valorBase;
            campoDiferencaBase.innerText = formatarNumero(diferencaRestante);

            // 3. Calcula Caixa 2 (Valor Laranja)
            let valorMultiplicarExtra = parseFloat(document.getElementById('valorMultiplicarExtra').value);
            let valorLaranjaFinal = 0;
            
            if (!isNaN(valorMultiplicarExtra)) {
                valorLaranjaFinal = diferencaRestante * valorMultiplicarExtra;
                textoCaixa2.innerText = "Diferença Multiplicada:";
            } else {
                valorLaranjaFinal = diferencaRestante;
                textoCaixa2.innerText = "Diferença Restante:";
            }
            
            campoCaixa2.innerText = formatarNumero(valorLaranjaFinal);

            // 4. LÓGICA DO ALERTA (Compara Laranja com Azul)
            if (valorLaranjaFinal < resultadoMultiplicacao) {
                alerta.style.display = "block";
                alerta.className = "alert-box alert-loss";
                alerta.innerText = "⚠️ VAI PERDER";
            } else if (valorLaranjaFinal > resultadoMultiplicacao) {
                alerta.style.display = "block";
                alerta.className = "alert-box alert-win";
                alerta.innerText = "✅ VAI GANHAR";
            } else {
                // Se forem exatamente iguais, esconde o alerta
                alerta.style.display = "none";
            }
        }
    </script>
</body>
</html>
